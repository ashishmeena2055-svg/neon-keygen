<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        :root { --neon: #ff0050; --bg: #0a0a0a; }
        body { background: var(--bg); color: #fff; font-family: 'Poppins', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: rgba(255,255,255,0.03); border: 1px solid var(--neon); padding: 40px; border-radius: 12px; backdrop-filter: blur(10px); width: 350px; text-align: center; }
        input { width: 100%; padding: 12px; background: #000; border: 1px solid #333; color: var(--neon); margin-bottom: 20px; }
        button { width: 100%; padding: 12px; background: var(--neon); border: none; color: #fff; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        #status { margin-top: 20px; font-size: 0.8rem; color: #555; }
        footer { position: fixed; bottom: 20px; font-size: 0.7rem; color: #444; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="color:var(--neon); font-family: 'Bebas Neue'; letter-spacing: 2px;">NEON KEYGEN</h2>
        <input type="text" id="target" placeholder="Paste Link (rarestudy)...">
        <button onclick="start()">Execute Bypass</button>
        <div id="status">READY</div>
    </div>
    <footer>Dev with ♥ by Ashish</footer>

    <script>
        const API_BASE = "https://your-railway-url.up.railway.app"; // Change this after deploy

        async function start() {
            const url = document.getElementById('target').value;
            const status = document.getElementById('status');
            
            status.innerText = "⚡ CONTACTING ENGINE...";
            const res = await fetch(`${API_BASE}/api/automate`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ targetUrl: url })
            });
            const { jobId } = await res.json();

            const poller = setInterval(async () => {
                const sRes = await fetch(`${API_BASE}/api/status/${jobId}`);
                const data = await sRes.json();
                status.innerText = data.status;

                if (data.status === 'SUCCESS') {
                    clearInterval(poller);
                    window.location.href = data.url;
                } else if (data.status === 'FAILED') {
                    clearInterval(poller);
                    alert("Engine Failure. Try again.");
                }
            }, 3000);
        }
    </script>
</body>
</html>
